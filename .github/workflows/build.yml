name: DevOps Sandbox CI Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4


      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 3. Build the JARs (Skipping tests to avoid DB connection errors in CI)
      - name: Build All Microservices
        run: mvn clean package -B -DskipTests

      # 4. Use v4 of upload-artifact (THIS FIXES YOUR ERROR)
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sandbox-binaries
          path: "**/target/*.jar"
