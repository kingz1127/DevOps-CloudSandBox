server:
  port: ${PORT:8080}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
              - "http://localhost:3000"
              - "https://dev-ops-cloud-sand-box.vercel.app"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            allowedHeaders:
              - "*"
            allowCredentials: true
            maxAge: 3600
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/auth/**, /auth/v3/api-docs/**

        - id: container-sim-service-api
          uri: ${CONTAINER_SIM_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/containers/**
          filters:
            - AuthenticationFilter

        - id: container-sim-service-docs
          uri: ${CONTAINER_SIM_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/containers/v3/api-docs/**
          filters:
            - StripPrefix=1

        - id: progress-service
          uri: ${PROGRESS_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/v1/progress/**
          filters:
            - AuthenticationFilter

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: Authentication Service
        url: /auth/v3/api-docs
      - name: Container Simulator Service
        url: /containers/v3/api-docs
  api-docs:
    path: /v3/api-docs

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka/}

jwt:
  secret: ${JWT_SECRET:1zcbHpUZkLDels67-SUEGSSt_nWdQpc_2hamlL5LJwa}
