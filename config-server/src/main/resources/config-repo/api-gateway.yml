server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/api/v1/auth/**, /auth-service/v3/api-docs/**
          filters:
            - PreserveHostHeader
            # Rewrites /auth-service/v3/api-docs to /v3/api-docs before sending to service
            - RewritePath=/auth-service/(?<path>.*), /$\{path}

        - id: container-sim-service
          uri: lb://CONTAINER-SIM-SERVICE
          predicates:
            - Path=/api/v1/containers/**, /container-sim-service/v3/api-docs/**
          filters:
            - AuthenticationFilter
            - RewritePath=/container-sim-service/(?<path>.*), /$\{path}

        - id: manifest-service
          uri: lb://MANIFEST-SERVICE
          predicates:
            - Path=/api/v1/manifests/**, /manifest-service/v3/api-docs/**
          filters:
            - AuthenticationFilter
            - RewritePath=/manifest-service/(?<path>.*), /$\{path}

        - id: progress-service
          uri: lb://PROGRESS-SERVICE
          predicates:
            - Path=/api/v1/progress/**, /progress-service/v3/api-docs/**
          filters:
            - AuthenticationFilter
            - RewritePath=/progress-service/(?<path>.*), /$\{path}

        - id: loadbalancer-sim-service
          uri: lb://LOADBALANCER-SIM-SERVICE
          predicates:
            - Path=/api/v1/lb/**, /loadbalancer-sim-service/v3/api-docs/**
          filters:
            - AuthenticationFilter
            - RewritePath=/loadbalancer-sim-service/(?<path>.*), /$\{path}

# Swagger UI aggregation configuration
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: 1. Auth Service
        url: /auth-service/v3/api-docs
      - name: 2. Container Simulator
        url: /container-sim-service/v3/api-docs
      - name: 3. Manifest Validator
        url: /manifest-service/v3/api-docs
      - name: 4. Progress Tracker
        url: /progress-service/v3/api-docs
      - name: 5. Load Balancer Sim
        url: /loadbalancer-sim-service/v3/api-docs