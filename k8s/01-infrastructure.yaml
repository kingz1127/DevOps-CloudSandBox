apiVersion: apps/v1
kind: Deployment
metadata:
  name: discovery-service
  namespace: sandbox-ns
spec:
  replicas: 1
  selector:
    matchLabels: { app: discovery }
  template:
    metadata: { labels: { app: discovery } }
    spec:
      containers:
        - name: discovery
          image: devops-cloudsandbox-discovery-service:latest
          ports: [{ containerPort: 8761 }]
---
apiVersion: v1
kind: Service
metadata:
  name: discovery-service
  namespace: sandbox-ns
spec:
  selector: { app: discovery }
  ports: [{ port: 8761, targetPort: 8761 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-server
  namespace: sandbox-ns
spec:
  replicas: 1
  selector:
    matchLabels: { app: config-server }
  template:
    metadata: { labels: { app: config-server } }
    spec:
      containers:
        - name: config-server
          image: devops-cloudsandbox-config-server:latest
          ports: [{ containerPort: 8888 }]
          env:
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              valueFrom: { configMapKeyRef: { name: sandbox-config, key: EUREKA_URL } }
---
apiVersion: v1
kind: Service
metadata:
  name: config-server
  namespace: sandbox-ns
spec:
  selector: { app: config-server }
  ports: [{ port: 8888, targetPort: 8888 }]