# Note: I have combined them for brevity. Copy the pattern for each.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: sandbox-ns
spec:
  replicas: 1
  selector: { matchLabels: { app: auth } }
  template:
    metadata: { labels: { app: auth } }
    spec:
      containers:
        - name: auth
          image: devops-cloudsandbox-auth-service:latest
          ports: [{ containerPort: 8081 }]
          env:
            - name: SPRING_CONFIG_IMPORT
              value: "optional:configserver:http://config-server:8888"
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: "http://discovery-service:8761/eureka/"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: sandbox-ns
spec:
  selector: { app: auth }
  ports: [{ port: 8081 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: container-sim-service
  namespace: sandbox-ns
spec:
  replicas: 1
  selector: { matchLabels: { app: container-sim } }
  template:
    metadata: { labels: { app: container-sim } }
    spec:
      containers:
        - name: sim
          image: devops-cloudsandbox-container-sim-service:latest
          ports: [{ containerPort: 8082 }]
          env:
            - name: SPRING_CONFIG_IMPORT
              value: "optional:configserver:http://config-server:8888"
---
apiVersion: v1
kind: Service
metadata:
  name: container-sim-service
  namespace: sandbox-ns
spec:
  selector: { app: container-sim }
  ports: [{ port: 8082 }]