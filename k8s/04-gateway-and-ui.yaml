apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: sandbox-ns
spec:
  replicas: 2
  selector: { matchLabels: { app: gateway } }
  template:
    metadata: { labels: { app: gateway } }
    spec:
      containers:
        - name: gateway
          image: devops-cloudsandbox-api-gateway:latest
          ports: [{ containerPort: 8080 }]
          env:
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: "http://discovery-service:8761/eureka/"
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-lb
  namespace: sandbox-ns
spec:
  type: LoadBalancer
  selector: { app: gateway }
  ports: [{ port: 80, targetPort: 8080 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-ui
  namespace: sandbox-ns
spec:
  replicas: 1
  selector: { matchLabels: { app: frontend } }
  template:
    metadata: { labels: { app: frontend } }
    spec:
      containers:
        - name: ui
          image: devops-cloudsandbox-frontend:latest
          ports: [{ containerPort: 3000 }]
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-lb
  namespace: sandbox-ns
spec:
  type: LoadBalancer
  selector: { app: frontend }
  ports: [{ port: 3000, targetPort: 3000 }]