apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: cloud-sandbox
spec:
  replicas: 2 # Professional scaling
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: devops-sandbox/api-gateway:latest
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-lb
  namespace: cloud-sandbox
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 8080
  selector:
    app: gateway