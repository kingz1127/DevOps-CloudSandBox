server:
  port: ${PORT:8084}

spring:
  application:
    name: loadbalancer-sim-service
  config:
    import: "optional:configserver:http://config-server:8888"

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://discovery-service:8761/eureka/}  # Change from localhost
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    hostname: loadbalancer-sim-service

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.cloudsandbox: DEBUG
    com.netflix: DEBUG