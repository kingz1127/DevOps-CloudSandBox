server:
  port: 8085

spring:
  application:
    name: progress-service
  config:
    import: "optional:configserver:http://config-server:8888"

  datasource:
    url: jdbc:postgresql://postgres-progress:5432/sandbox_progress
    username: postgres
    password: adedeji1127
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false

eureka:
  client:
    service-url:
      defaultZone: http://discovery-service:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html